name: Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on: [push, pull_request]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    continue-on-error: ${{ matrix.experimental == true }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        experimental: [false]
        include:
          - python-version: "3.14-dev"
            experimental: true

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"
          pip install coverage

      - name: Run tests
        run: |
          coverage run --branch --source=deep_dataclasses -m pytest test/ -q
          coverage report -m
          coverage json

      - name: Update coverage badge
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && matrix.python-version == '3.12'
        run: |
          TOTAL=$(python -c "import json; d=json.load(open('coverage.json')); print(round(d['totals']['percent_covered']))")
          if   [ "$TOTAL" -ge 90 ]; then COLOR=brightgreen
          elif [ "$TOTAL" -ge 75 ]; then COLOR=green
          elif [ "$TOTAL" -ge 60 ]; then COLOR=yellow
          else COLOR=red
          fi
          JSON='{"schemaVersion":1,"label":"coverage","message":"'$TOTAL'%","color":"'$COLOR'"}'
          rm -f coverage.json .coverage
          if git fetch origin badges 2>/dev/null; then
            git checkout badges
          else
            git checkout --orphan badges
            git rm -rf . 2>/dev/null || true
          fi
          echo "$JSON" > coverage.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage.json
          git diff --cached --quiet || git commit -m "chore: update coverage badge [$TOTAL%]"
          git push origin badges
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
